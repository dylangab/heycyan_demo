name: heycyan_demo
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  stacked: ^3.4.0
  stacked_services: ^1.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_blue_plus: ^2.3.3
  logger: ^1.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  hugeicons: ^1.1.7

dev_dependencies:
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.1
  stacked_generator: ^1.3.3
  golden_toolkit: ^0.15.0
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  shimmer: ^3.0.0
  

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

# 🚀 APP LAUNCHER ICON CONFIG
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true

# 🌊 SPLASH SCREEN CONFIG
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/heycyan_splash.png
  fullscreen: true
  background_image: assets/images/heycyan_splash.png
  android_gravity: fill

  android_12:
    color: "#FFFFFF"
    image: assets/images/heycyan_splash.png




